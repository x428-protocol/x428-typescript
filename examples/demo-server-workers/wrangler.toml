name = "x428-demo-workers"
main = "src/index.ts"
compatibility_date = "2026-01-28"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "X428McpAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["X428McpAgent"]

[[routes]]
pattern = "demo.x428.org"
custom_domain = true
